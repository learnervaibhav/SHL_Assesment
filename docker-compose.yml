# Docker Compose for SHL Assessment - Neon Version

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shl_assessment_app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_MODEL_NAME: ${GOOGLE_MODEL_NAME}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: 1
    
    ports:
      - "8000:8000"
    
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    networks:
      - shl_network

networks:
  shl_network:
    driver: bridge
